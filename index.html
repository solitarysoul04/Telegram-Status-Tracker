<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgMain: '#0f141b', bgCard: '#151c24', borderCard: '#242e3b', tgBlue: '#2AABEE' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['"SF Mono"', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f141b; color: #ffffff; }
        .clock-font { font-family: 'SF Mono', ui-monospace, monospace; }
        .history-transition { transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div class="text-center mb-10">
        <div class="flex items-center justify-center space-x-3 mb-3">
            <div class="w-8 h-8 bg-tgBlue rounded-full flex items-center justify-center text-white">
                <i class="fa-brands fa-telegram text-xl -ml-0.5 mt-0.5"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wide">Telegram Tracker</h1>
        </div>
        <p class="text-gray-400 text-sm">Instant Event-Driven Monitor</p>
    </div>

    <div class="w-full max-w-md space-y-4">
        
        <div class="bg-bgCard border border-borderCard rounded-2xl p-6 shadow-lg">
            
            <div class="flex justify-between items-center py-3 border-b border-borderCard border-opacity-50">
                <span class="text-gray-400 text-sm font-medium">Status</span>
                <div class="flex items-center space-x-2 bg-green-500/10 border border-green-500/20 text-green-500 px-3 py-1 rounded-full text-xs font-semibold" id="status-badge">
                    <span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)] animate-pulse" id="status-dot"></span>
                    <span id="status-text">Active</span>
                </div>
            </div>

            <div class="flex justify-between items-center py-4 border-b border-borderCard border-opacity-50">
                <span class="text-gray-400 text-sm font-medium">Monitoring</span>
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-6 rounded-full bg-blue-900/50 text-blue-400 flex items-center justify-center text-xs font-bold" id="target-initial">I</div>
                    <span class="font-bold text-white tracking-wide" id="target-username">@loading...</span>
                </div>
            </div>

            <div class="pt-4">
                <span class="text-gray-400 text-sm font-medium block mb-2">Server time</span>
                <div class="clock-font text-2xl font-bold tracking-wider mb-1" id="clock-time">00:00:00 PM</div>
                <div class="text-gray-500 text-xs" id="clock-date">Loading date...</div>
            </div>
        </div>

        <div class="bg-bgCard border border-borderCard rounded-xl overflow-hidden">
            <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-borderCard transition-colors" onclick="toggleHistory()">
                <div class="flex items-start space-x-3">
                    <div class="mt-0.5 text-gray-400"><i class="fa-regular fa-clock"></i></div>
                    <div>
                        <h3 class="font-semibold text-sm">Event history database</h3>
                        <p class="text-xs text-gray-500">Live online/offline logs</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-down text-gray-500 text-xs transition-transform duration-300" id="history-arrow"></i>
            </div>
            
            <div id="history-content" class="max-h-0 opacity-0 history-transition bg-[#0c1015]">
                <ul id="history-list" class="p-4 space-y-3 text-sm border-t border-borderCard max-h-64 overflow-y-auto">
                    <li class="text-gray-500 text-center py-2 text-xs">Awaiting events...</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            document.getElementById('clock-date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        let historyOpen = false;
        function toggleHistory() {
            const content = document.getElementById('history-content');
            const arrow = document.getElementById('history-arrow');
            historyOpen = !historyOpen;
            if (historyOpen) {
                content.classList.replace('max-h-0', 'max-h-80');
                content.classList.replace('opacity-0', 'opacity-100');
                arrow.classList.add('rotate-180');
            } else {
                content.classList.replace('max-h-80', 'max-h-0');
                content.classList.replace('opacity-100', 'opacity-0');
                arrow.classList.remove('rotate-180');
            }
        }

        function formatRelativeTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " · " + date.toLocaleDateString();
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                document.getElementById('target-username').textContent = data.target;
                document.getElementById('target-initial').textContent = data.target.replace('@', '').charAt(0).toUpperCase();

                const badge = document.getElementById('status-badge');
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                
                if(data.current_status === "online") {
                    text.textContent = "Target Online";
                    badge.className = "flex items-center space-x-2 bg-green-500/10 border border-green-500/20 text-green-500 px-3 py-1 rounded-full text-xs font-semibold";
                    dot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)] animate-pulse";
                } else {
                    text.textContent = "Target Offline";
                    badge.className = "flex items-center space-x-2 bg-red-500/10 border border-red-500/20 text-red-500 px-3 py-1 rounded-full text-xs font-semibold";
                    dot.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]";
                }

                const historyList = document.getElementById('history-list');
                if (data.history && data.history.length > 0) {
                    historyList.innerHTML = '';
                    data.history.forEach(item => {
                        const li = document.createElement('li');
                        li.className = "flex justify-between items-center";
                        
                        const statusBadge = item.event === 'online' 
                            ? `<span class="text-green-400 font-medium"><i class="fa-solid fa-arrow-up mr-1 text-[10px]"></i>Online</span>`
                            : `<span class="text-red-400 font-medium"><i class="fa-solid fa-arrow-down mr-1 text-[10px]"></i>Offline</span>`;

                        li.innerHTML = `${statusBadge} <span class="text-gray-500 text-xs">${formatRelativeTime(item.time)}</span>`;
                        historyList.appendChild(li);
                    });
                }
            } catch (error) {
                console.error("Error fetching status:", error);
            }
        }
        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>
</html>
